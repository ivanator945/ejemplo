<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Home</title>
</head>
<body>

  <h1>Bienvenido 👋</h1>
  <p id="user"></p>

  <button onclick="logout()">Cerrar sesión</button>

  <script>
    // Proteger acceso
    if (localStorage.getItem("logged") !== "true") {
      window.location.href = "index.html";
    }

    document.getElementById("user").textContent =
      "Usuario: " + localStorage.getItem("user");

    function logout() {
      localStorage.clear();
      window.location.href = "index.html";
    }
  </script>

</body>
</html>
